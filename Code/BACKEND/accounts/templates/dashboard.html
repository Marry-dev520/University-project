{% extends 'base.html' %}
{% block content %}
<h2>Dashboard</h2>

<p>Your Role: {{ user.role }}</p>

{% if user.role == 'student' %}
    <a href="{% url 'assessment' %}">Take Skill Assessment</a>
{% elif user.role == 'mentor' %}

{% elif user.role == 'admin' %}
    <p>Admin Panel</p>
{% endif %}

{% endblock %}
